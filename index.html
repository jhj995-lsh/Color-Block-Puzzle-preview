<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>彩色砖块 HTML5</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f0f0f0;
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
    }

    .stage-wrap {
      width: min(96vw, 660px);
      aspect-ratio: 660 / 480;
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.12);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #efefef;
      touch-action: manipulation;
    }
  </style>
</head>
<body>
  <div class="stage-wrap">
    <canvas id="game" width="660" height="480" aria-label="彩色砖块"></canvas>
  </div>

  <script src="./game.js" defer></script>
</body>
</html>
